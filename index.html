    <!-- Terminal-style page background before React loads -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: black;
        color: #39ff14;
        font-family: 'Courier New', Courier, monospace;
      }

      /* Loading screen shown before React mounts */
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 1.2rem;
        color: #39ff14;
        letter-spacing: 2px;
      }

      #loading::after {
        content: '_';
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>

    <!-- Loading fallback shown before React hydrates -->
    <div id="loading">Booting terminal</div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide loading screen once React root is ready -->
    <script>
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loading = document.getElementById('loading');
          if (loading) loading.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
